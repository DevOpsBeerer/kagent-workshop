apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: artemis-observability
  labels:
    app: grafana
    kagent-workshop/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        kagent-workshop/component: observability
    spec:
      containers:
        - name: grafana
          image: grafana/grafana-oss:11.3.0
          # Anonymous-admin: workshop runs in per-participant vClusters; the
          # Service is ClusterIP-only and reached via kubectl port-forward, so
          # no cross-tenant exposure path exists. The "this is not how you'd
          # run Grafana in production" disclaimer lives in uc3/README.md
          # (STORY-021).
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_AUTH_BASIC_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: storage
          emptyDir: {}
