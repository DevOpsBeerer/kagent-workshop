apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-server
  namespace: artemis-observability
  labels:
    app: prometheus-server
    kagent-workshop/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
        kagent-workshop/component: observability
    spec:
      serviceAccountName: prometheus-server
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=2h
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 30
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: tsdb
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-server
        - name: tsdb
          emptyDir: {}
