# RBAC for Prometheus.
#
# kubernetes_sd_configs needs cluster-scoped read on services / endpoints /
# pods / nodes for target discovery (`role: endpoints`, `role: node`,
# `role: pod`).
#
# `nodes/metrics` is the kubelet's own /metrics endpoint when reached directly
# on port 10250; `nodes/proxy` is needed for the API-server proxy path
# (`/api/v1/nodes/<name>/proxy/metrics(/cadvisor)`) that the
# `kubernetes-nodes` + `kubernetes-nodes-cadvisor` scrape jobs use to avoid
# direct 10250 reach. The nonResourceURL `/metrics` covers the API server's
# own metrics endpoint scraped by the `kubernetes-apiservers` job.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-server
  namespace: artemis-observability
  labels:
    app: prometheus-server
    kagent-workshop/component: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: artemis-observability-prometheus
  labels:
    kagent-workshop/component: observability
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - pods
      - nodes
      - nodes/metrics
      - nodes/proxy
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: artemis-observability-prometheus
  labels:
    kagent-workshop/component: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: artemis-observability-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus-server
    namespace: artemis-observability
