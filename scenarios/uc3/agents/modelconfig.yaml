# ModelConfig slot for UC3 — kept for naming-convention consistency
# (docs/artemis-naming.md L78) and for UC4 coordinator override compatibility.
#
# The UC3 Agent itself (uc3/agents/agent.yaml) references kagent's
# `default-model-config` in the `kagent` namespace because the Agent CRD lives
# in `kagent` (per docs/artemis-naming.md L63 — cluster-scope-discoverable
# kagent CRDs use the artemis- prefix and live in kagent), and ModelConfig is
# namespaced. Reusing the kagent-installed default ModelConfig avoids
# per-UC duplication of the artemis-llm-credentials Secret in two namespaces.
#
# This file ships a per-UC `artemis-llm` slot in `artemis-uc3` so:
# - workshop-infrastructure can patch it per-UC if a future override is needed.
# - UC4's coordinator (STORY-025) has a per-UC ModelConfig template to copy.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: artemis-llm
  namespace: artemis-uc3
  labels:
    kagent-workshop/uc: uc3
spec:
  provider: OpenAI
  model: gpt-4o-mini
  apiKeySecret: artemis-llm-credentials
  apiKeySecretKey: api-key
