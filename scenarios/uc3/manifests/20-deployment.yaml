apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control
  namespace: artemis-uc3
  labels:
    app: mission-control
    kagent-workshop/uc: uc3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control
  template:
    metadata:
      labels:
        app: mission-control
    spec:
      containers:
        - name: mission-control
          # Tag deliberately not published — produces ImagePullBackOff on first
          # pull, same friction family as UC1/UC2. UC3's pedagogy is the
          # *remediation* path: with the A2A wiring added in Beat 3, the built-
          # in `k8s-agent` delegates to `artemis-image-fetcher` (from UC2) to
          # discover a published tag, then patches this Deployment to that tag
          # itself. No human kubectl in the loop.
          image: rg.fr-par.scw.cloud/apogasa/mission-control:v999
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_IDENTITY
              value: mission-control
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
