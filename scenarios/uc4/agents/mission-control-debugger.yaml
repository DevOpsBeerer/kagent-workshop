# Artemis mission-control debugger agent. Read-only diagnoser for the
# `mission-control` Deployment in the `artemis-uc1` namespace.
#
# Why this lives under `uc4/agents/` (STORY-045, post-pivot):
#   - UC1's tour no longer deploys a custom agent. It uses kagent's
#     built-in `k8s-agent` (KubeAssist) via the dashboard chat surface,
#     with a 2-prompt flow (diagnose then propose remediation command).
#   - UC4's coordinator (`uc4/agents/agent.yaml`) still delegates to
#     this debugger by name as one of its three a2a specialists, so
#     the CRD has to be applied as part of UC4's bundle.
#
# Tool surface (read-only):
#   - kubectl get pod / kubectl describe pod / kubectl get events
#
# kagent v0.9.0 sources tools from MCP servers, not a `Tool` CRD (the CRD
# does not exist in v0.9.0; cf. STORY-005 finding). The `kagent-tool-server`
# RemoteMCPServer ships with kagent's demo profile and exposes the kubectl
# read tools used here.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: artemis-mission-control-debugger
  namespace: kagent
  labels:
    kagent-workshop/uc: uc1
spec:
  type: Declarative
  description: |
    Diagnoses why the Artemis `mission-control` deployment is not coming up
    in the `artemis-uc1` namespace.
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are an Artemis mission-control on-call SRE. Your job is to diagnose
      why the `mission-control` Deployment in the `artemis-uc1` namespace is
      not coming up, and report a single sentence of root cause plus a one-line
      remediation hint.

      Use ONLY the kubectl read tools provided. Do not attempt to apply, patch,
      or delete any resource.

      Diagnostic loop:

        1. `k8s_get_resources` with kind=Pod and namespace=artemis-uc1 — list
           the pods in the namespace. Pick the `mission-control-…` pod.
        2. `k8s_describe_resource` with kind=Pod, namespace=artemis-uc1, and
           the pod name from step 1. Read the phase, the container status,
           and the recent events at the bottom.
           
      Be concise. The participant is running through a 5-minute tour and
      needs the answer, not a tutorial.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          namespace: kagent
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_events
