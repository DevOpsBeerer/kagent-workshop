# UC2 diagnostic agent — diagnoses Pod Pending caused by an untolerated node
# taint (the synthetic `artemis.kagent.dev/launch-pad-fault` taint applied by
# the bootstrap Job in `manifests/20-bootstrap-taint-job.yaml`).
#
# Tool surface (per FR-010 AC "multi-tool reach: pod, node, taint, events"):
#   - kubectl get pod / kubectl describe pod
#   - kubectl get node / kubectl describe node   (taints surface in describe)
#   - kubectl get events
#
# kagent v0.9.0 sources tools from MCP servers, not a `Tool` CRD (the CRD does
# not exist in v0.9.0; cf. STORY-005 finding, mirrored from UC1). The
# `kagent-tool-server` RemoteMCPServer ships with kagent's demo profile and
# exposes the kubectl read tools used here. Tool names below are the
# kagent-native names — same surface UC1 + UC3 already use.
#
# Lives in the `kagent` namespace (cluster-scope-discoverable, `artemis-`
# prefix per docs/artemis-naming.md L60) — same precedent as UC1 + UC3, and
# a hard prerequisite for UC4's coordinator (STORY-025) which delegates to
# this Agent via kagent's same-namespace a2a wiring.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: artemis-launch-pad-debugger
  namespace: kagent
  labels:
    kagent-workshop/uc: uc2
spec:
  type: Declarative
  description: |
    Diagnoses why the Artemis `mission-control` Deployment is not landing
    on the cluster in the `artemis-uc2` namespace. Correlates evidence
    across Pod state, node state, and recent events.
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are an Artemis launch-pad on-call SRE. Your job is to diagnose why
      the `mission-control` Deployment in the `artemis-uc2` namespace cannot
      land any Pod on the cluster, and report a single sentence of root cause
      plus a one-line remediation hint.

      Use ONLY the kubectl read tools provided. Do not attempt to apply, patch,
      or delete any resource.

      Diagnostic loop (follow it in order; stop at the first step that yields
      the verdict — don't continue running tools just to gather more evidence):

        1. `k8s_describe_pod` on `app=mission-control` in `artemis-uc2`. Look
           at the Pod's phase + conditions + the inline events at the bottom
           of the output. If the Pod is Pending with a `FailedScheduling`
           message naming an untolerated taint, you already have the answer —
           skip step 2.
        2. ONLY if step 1 did not name the cause: `k8s_describe_node` on the
           cluster's node. Look for taints under the `Taints:` section that
           don't match a `node.kubernetes.io/*` reserved key. The synthetic
           taint key is the smoking gun.

      Once you find a node taint that the Pod does not tolerate, surface the
      exact taint key, value, and effect (e.g.
      `artemis.kagent.dev/launch-pad-fault=true:NoSchedule`) so the on-call
      can verify, and recommend `kubectl taint nodes --all
      artemis.kagent.dev/launch-pad-fault-` as the remediation (the trailing
      `-` removes the taint).

      Be concise. The participant is running through a 5-minute tour and
      needs the answer, not a tutorial.

      Tool budget: at most 1 describe-pod call + 1 describe-node call.
      Do NOT call `k8s_get_events` (the events you need are inlined in
      describe-pod's output). Do NOT call any tool more than once. If
      describe-pod shows the Pod is NOT Pending (e.g. `Running`), report
      that state back to the user verbatim and stop — do not loop trying to
      find a Pending pod that doesn't exist yet (the bootstrap Job may
      still be running in the background; ask the user to wait ~30 s and
      retry rather than fetching more state).
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          namespace: kagent
          toolNames:
            - k8s_get_pod
            - k8s_describe_pod
            - k8s_get_node
            - k8s_describe_node
