# ModelConfig for the UC1 diagnostic agent.
#
# Provider, model, and credentials are externalised — `workshop-infrastructure`
# injects the actual provider choice and the `artemis-llm-credentials` Secret at
# deploy time per architecture L142–146 + NFR-011 (no secrets in repo).
#
# UC1 ships with `provider: OpenAI` + `model: gpt-4o-mini` as a sensible default
# for a participant's first agent encounter. The default can be overridden by a
# kustomize patch from workshop-infrastructure without editing this file.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: artemis-llm
  namespace: artemis-uc1
  labels:
    kagent-workshop/uc: uc1
spec:
  provider: OpenAI
  model: gpt-4o-mini
  apiKeySecret: artemis-llm-credentials
  apiKeySecretKey: api-key
