apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operators-control-center
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operators-control-center
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: operators-control-center
subjects:
  - kind: ServiceAccount
    name: operators-control-center
    namespace: operators-control-center
