{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operators-control-center.fullname" . }}
  labels:
    {{- include "operators-control-center.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "operators-control-center.fullname" . }}
  labels:
    {{- include "operators-control-center.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "operators-control-center.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "operators-control-center.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
