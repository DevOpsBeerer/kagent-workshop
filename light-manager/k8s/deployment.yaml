apiVersion: apps/v1
kind: Deployment
metadata:
  name: light-manager
  namespace: light-manager
  labels:
    app.kubernetes.io/name: light-manager
    app.kubernetes.io/component: app
spec:
  replicas: 5
  # SQLite on RWO PVC: never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: light-manager
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: light-manager
        app.kubernetes.io/component: app
    spec:
      containers:
      - name: app
        # Override before apply, e.g.
        #   sed -i '' 's|light-manager:dev|registry.example.com/light-manager:v0.1.0|' k8s/deployment.yaml
        # or, with kustomize, edit k8s/kustomization.yaml.
        image: light-manager:dev
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: LIGHT_MANAGER_STATIC_DIR
          value: /app/static
        - name: LIGHT_MANAGER_DB_PATH
          value: /data/light-manager.db
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: light-manager-data
        # Fallback if the cluster has no usable StorageClass; the data resets on every pod restart.
        # Replace the persistentVolumeClaim block above with:
        # emptyDir: {}
