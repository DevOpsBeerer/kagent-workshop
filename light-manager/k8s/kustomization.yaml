apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

# Override the image at apply time without editing deployment.yaml:
#   cd k8s
#   kustomize edit set image light-manager=registry.example.com/light-manager:v0.1.0
#   kubectl apply -k .
images:
- name: light-manager
  newName: rg.fr-par.scw.cloud/apogasa/mlc-system
  newTag: v1.0.5
